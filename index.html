<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Oracle's Whisper - Discover gentle power within you through ancient wisdom">
  <title>Oracle's Whisper | 神谕的低语</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #F59E0B;
      --background: #FEF3C7;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 50%, #FEF3C7 100%);
      min-height: 100vh;
    }
    .font-title {
      font-family: 'Cinzel', serif;
    }
    .glow {
      text-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
    }
    .card-glow {
      box-shadow: 0 4px 20px rgba(245, 158, 11, 0.15);
    }
    .btn-primary {
      background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
    }
    .floating {
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .sparkle {
      animation: sparkle 2s ease-in-out infinite;
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body class="text-gray-800">
  <!-- Language Toggle -->
  <nav class="absolute top-4 right-4 z-10">
    <button id="langToggle" class="px-4 py-2 bg-white/80 backdrop-blur rounded-full text-sm font-medium hover:bg-white transition-colors card-glow">
      EN / 中
    </button>
  </nav>

  <!-- Main Content -->
  <main class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="max-w-2xl w-full text-center">
      <!-- Decorative Elements -->
      <div class="relative mb-8">
        <div class="absolute -top-20 left-1/2 transform -translate-x-1/2 w-32 h-32">
          <div class="absolute top-0 left-0 w-4 h-4 bg-amber-400 rounded-full sparkle" style="animation-delay: 0s;"></div>
          <div class="absolute top-8 right-4 w-3 h-3 bg-amber-300 rounded-full sparkle" style="animation-delay: 0.5s;"></div>
          <div class="absolute bottom-4 left-2 w-5 h-5 bg-amber-500 rounded-full sparkle" style="animation-delay: 1s;"></div>
          <div class="absolute bottom-0 right-0 w-3 h-3 bg-amber-400 rounded-full sparkle" style="animation-delay: 1.5s;"></div>
        </div>
      </div>

      <!-- Hero Card -->
      <div class="bg-white/90 backdrop-blur rounded-3xl p-8 md:p-12 card-glow floating">
        <!-- Title -->
        <h1 class="font-title text-4xl md:text-5xl lg:text-6xl font-bold text-amber-800 mb-6 glow" data-i18n="hero.title">
          Oracle's Whisper
        </h1>

        <!-- Subtitle -->
        <p class="text-xl md:text-2xl text-amber-700 mb-4 font-medium" data-i18n="hero.subtitle">
          Discover gentle power within you
        </p>

        <!-- Description -->
        <p class="text-gray-600 text-lg mb-8" data-i18n="hero.description">
          Find strength in gentle voices from ancient wisdom
        </p>

        <!-- CTA Button -->
        <a href="quiz.html" class="btn-primary inline-block px-8 py-4 text-white text-lg font-semibold rounded-2xl shadow-lg">
          <span data-i18n="hero.cta">Begin Your Journey</span>
          <span class="ml-2">→</span>
        </a>
      </div>

      <!-- Additional Info -->
      <div class="mt-8 text-gray-500 text-sm">
        <p data-i18n="footer.disclaimer">For entertainment reference only.</p>
        <div class="mt-4 flex justify-center gap-6">
          <a href="privacy.html" class="hover:text-amber-700 transition-colors">Privacy Policy</a>
          <a href="disclaimer.html" class="hover:text-amber-700 transition-colors">Disclaimer</a>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="absolute bottom-4 left-0 right-0 text-center">
    <p class="text-amber-800/60 text-sm" data-i18n="footer.weAreGods">
      We are all children of gods, you deserve a good life.
    </p>
  </footer>

  <!-- Scripts -->
  <script src="js/i18n.js"></script>
  <script>
    (async function() {
      // Load translations
      await loadTranslations('en');
      await loadTranslations('zh');

      // Initialize language and update translations
      const lang = initI18n();
      await loadTranslations(lang);
      updatePageTranslations();

      // Language toggle handler
      document.getElementById('langToggle').addEventListener('click', async () => {
        toggleLanguage();
      await loadTranslations(getCurrentLang());
        updatePageTranslations();
      });
    })();
  </script>
</body>
</html>
