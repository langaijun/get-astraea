<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7"/>
      <stop offset="50%" style="stop-color:#FDE68A"/>
      <stop offset="100%" style="stop-color:#FEF3C7"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="40" fill="#FCD34D" opacity="0.3"/>
  <circle cx="1100" cy="530" r="60" fill="#FBBF24" opacity="0.3"/>
  <circle cx="600" cy="315" r="200" fill="#F59E0B" opacity="0.05"/>

  <!-- Temple icon -->
  <g transform="translate(550, 180)">
    <polygon points="50,0 100,40 0,40" fill="url(#gold)"/>
    <rect x="10" y="40" width="80" height="10" fill="url(#gold)"/>
    <rect x="20" y="50" width="60" height="70" fill="#FCD34D"/>
    <rect x="35" y="70" width="30" height="50" fill="url(#gold)"/>
    <polygon points="50,0 55,25 45,25" fill="#FEF3C7" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="600" y="380" font-family="Cinzel, serif" font-size="56" font-weight="bold" fill="#1F2937" text-anchor="middle">
    Oracle's Whisper
  </text>

  <!-- Subtitle -->
  <text x="600" y="440" font-family="Cinzel, serif" font-size="32" fill="#92400E" text-anchor="middle">
    神谕的低语
  </text>

  <!-- Tagline -->
  <text x="600" y="500" font-family="Inter, sans-serif" font-size="24" fill="#4B5563" text-anchor="middle">
    Discover Your Guiding Deity
  </text>

  <!-- CTA -->
  <rect x="480" y="530" width="240" height="50" rx="25" fill="url(#gold)"/>
  <text x="600" y="563" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="white" text-anchor="middle">
    Take the Quiz →
  </text>

  <!-- Sparkles -->
  <text x="480" y="150" font-size="32" opacity="0.8">✨</text>
  <text x="700" y="120" font-size="24" opacity="0.6">✨</text>
  <text x="650" y="200" font-size="20" opacity="0.5">✨</text>
</svg>